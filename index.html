<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="page">
        <img src="images/bigRobot.png" alt="This is a big robot. It is very big. It is a robot." width="20%" height="100%">
        <div id="right">
            <p>
            This is not a real online service! You know you need something like this in your
            life to help you realise your deepest dreams.
            Sign up now and get started.
        </p>
        <p>
            You know you want to.
        </p>
        
        <form action="" method="post">
            <fieldset>
                <legend><h1>Let's Do This</h1></legend>

                <label for="firstName"></label>
                <input type="text" name="" id="firstName">

                <label for="lastName"></label>
                <input type="text" name="" id="lastName">

                <label for="email"></label>
                <input type="text" name="" id="email">

                <label for="phone"></label>
                <input type="text" name="" id="phone">

                <label for="password"></label>
                <input type="password" name="" id="password">

                <label for="confirmPassword"></label>
                <input type="password" name="" id="confirmPassword">
                
            </fieldset>
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </form>
        </div>
        


        
    </div>
